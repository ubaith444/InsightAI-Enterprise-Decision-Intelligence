apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insightai
  namespace: insightai
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: insightai.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: insightai-api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: insightai-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: insightai-web
                port:
                  number: 3000
