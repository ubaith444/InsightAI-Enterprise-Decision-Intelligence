apiVersion: apps/v1
kind: Deployment
metadata:
  name: insightai-api
  namespace: insightai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insightai-api
  template:
    metadata:
      labels:
        app: insightai-api
    spec:
      containers:
        - name: api
          image: insightai-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: insightai-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: insightai-api
  namespace: insightai
spec:
  selector:
    app: insightai-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
